name: Update AIDS Walk total

on:
  schedule:
    # 9 AM and 3 PM CT daily (UTC-5 in April = UTC 14:00 and 20:00)
    - cron: '0 14,20 * * *'
  workflow_dispatch: # manual trigger via GitHub Actions UI

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests

      - name: Scrape fundraising total
        run: python update_aidswalk.py

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/aidswalk.json
          git diff --cached --quiet && echo "No change." || (git commit -m "chore: update AIDS Walk total" && git push)
