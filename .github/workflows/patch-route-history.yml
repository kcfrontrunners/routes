name: Patch Route History

on:
  schedule:
    # Wednesday 9 PM CT (02:00 UTC Thursday) — after Wednesday evening run
    - cron: '0 2 * * 4'
    # Sunday 11 AM CT (16:00 UTC Sunday) — after Sunday morning run
    - cron: '0 16 * * 0'

  workflow_dispatch:
    inputs:
      days_back:
        description: 'How many days back to scan (default: 7)'
        required: false
        default: '7'
      dry_run:
        description: 'Dry run — print changes without writing'
        required: false
        type: boolean
        default: false

jobs:
  patch:
    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    permissions:
      contents: write   # needed to commit and push route-history.json

    steps:
      - name: Checkout routes repo
        uses: actions/checkout@v4.2.2
        with:
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v5.6.0
        with:
          python-version: '3.12'

      - name: Run patch_route_history.py
        env:
          KC_GOOGLE_API_KEY: ${{ secrets.KC_GOOGLE_API_KEY }}
        run: |
          DAYS_BACK="${{ github.event.inputs.days_back || '7' }}"
          DRY_RUN_FLAG=""
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            DRY_RUN_FLAG="--dry-run"
          fi
          python3 tools/patch_route_history.py \
            --api-key "$KC_GOOGLE_API_KEY" \
            --days-back "$DAYS_BACK" \
            $DRY_RUN_FLAG

      - name: Commit and push if changed
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/route-history.json
          if git diff --cached --quiet; then
            echo "No changes to route-history.json — skipping commit."
          else
            git commit -m "chore: patch route history [skip ci]"
            git pull --rebase origin main
            git push
          fi
